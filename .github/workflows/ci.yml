name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies if needed
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Generate rules
        run: npm run generate:rules

      - name: Test evidence fixture
        run: npm run test:evidence

      - name: JS syntax checks
        run: |
          node --check background.js
          node --check content-script.js
          node --check popup/popup.js
          node --check scripts/generate-rules.mjs
          node --check scripts/evaluate-test-set.mjs
          node --check shared/config.js

      - name: JSON parse checks
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const files = [
            "manifest.json",
            "rules/rules.json",
            "shared/tracker-catalog.json",
            "shared/tracking-params.json",
            "test/tracker-test-set.json",
            "package.json"
          ];
          for (const file of files) {
            JSON.parse(fs.readFileSync(file, "utf8"));
          }
          console.log("JSON OK");
          NODE

      - name: Generated files are in sync
        run: |
          git diff --exit-code -- rules/rules.json shared/config.js

      - name: Safety checks
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const sourceFiles = [
            "manifest.json",
            "background.js",
            "content-script.js",
            "popup/popup.html",
            "popup/popup.css",
            "popup/popup.js",
            "rules/rules.json",
            "shared/config.js",
            "shared/tracker-catalog.json",
            "shared/tracking-params.json",
            "scripts/generate-rules.mjs",
            "scripts/evaluate-test-set.mjs",
            "test/tracker-test-set.json"
          ];
          const forbidden = [
            "declarativeNetRequestFeedback",
            "webRequestBlocking",
            "onRuleMatchedDebug",
            "getMatchedRules",
            "privacyScore",
            "privacy-score"
          ];
          const remoteCallPatterns = [
            /\bfetch\s*\(/,
            /\bXMLHttpRequest\b/,
            /\bsendBeacon\b/
          ];
          let failed = false;

          for (const file of sourceFiles) {
            const text = fs.readFileSync(file, "utf8");
            for (const term of forbidden) {
              if (text.includes(term)) {
                console.error(`${file}: forbidden term "${term}"`);
                failed = true;
              }
            }
            for (const pattern of remoteCallPatterns) {
              if (pattern.test(text)) {
                console.error(`${file}: possible external runtime call ${pattern}`);
                failed = true;
              }
            }
          }

          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const allowedPermissions = new Set([
            "declarativeNetRequest",
            "storage",
            "webNavigation"
          ]);
          for (const permission of manifest.permissions || []) {
            if (!allowedPermissions.has(permission)) {
              console.error(`manifest.json: unexpected permission "${permission}"`);
              failed = true;
            }
          }

          if (failed) {
            process.exit(1);
          }
          console.log("Safety checks OK");
          NODE
