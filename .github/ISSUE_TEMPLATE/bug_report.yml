name: Bug report
description: Report a bug in the extension.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: chrome
    attributes:
      label: Chrome version
      placeholder: "Example: 126.0.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows, macOS, Linux, ChromeOS"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste relevant extension or page console errors if available.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Optional. Avoid private browsing data.
